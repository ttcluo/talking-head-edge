# MuseTalk UNet 知识蒸馏训练配置
# Teacher: musetalkV15/unet.pth (~850MB FP32, [320,640,1280,1280])
# Student: student_musetalk.json (~136MB FP32, [128,256,512,512])
# 数据: 直接复用 realtime_inference.py 预处理产出（无需 mmpose/decord）

exp_name: 'distill_lipsync'   # 嘴型优先，与 distill_v1 区分
output_dir: './exp_out/distill/'

# ========== 模型路径 ==========
teacher_unet_path:   "models/musetalkV15/unet.pth"
teacher_unet_config: "models/musetalkV15/musetalk.json"
whisper_model_path:  "models/whisper/tiny.pt"

# ========== 数据路径 ==========
avatar_base:    "results/v15/avatars"
audio_feat_dir: "dataset/distill/audio_feats"   # 由 precompute_audio_feats.py 生成
samples_per_avatar: 500

data:
  train_bs:   8    # 6 卡时每卡约 1 样本，避免 L_lip 的 VAE decode OOM
  num_workers: 4

# ========== 蒸馏损失权重（嘴型同步优先）==========
loss_params:
  output_distill: 0.5   # MSE(student_out, teacher_out)，保持 latent 结构
  feat_distill:   0.05  # cosine_sim 中间特征对齐
  lip_distill:    2.0   # 嘴部区域 MSE（主损失），显式约束唇形

# ========== 特征蒸馏层 ==========
feat_distill_layers:
  - "down_blocks.0"
  - "down_blocks.1"
  - "mid_block"
  - "up_blocks.2"
  - "up_blocks.3"

# ========== 优化器 ==========
solver:
  gradient_accumulation_steps: 4   # 有效 batch=8×4=32，弥补 train_bs 减小
  mixed_precision: 'fp16'
  gradient_checkpointing: True
  max_train_steps: 10000
  max_grad_norm: 1.0
  learning_rate: 5.0e-5
  lr_warmup_steps: 500
  lr_scheduler: "cosine"
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_weight_decay: 1.0e-2
  adam_epsilon: 1.0e-8

# ========== 验证 & 保存 ==========
checkpointing_steps: 2000

seed: 42
